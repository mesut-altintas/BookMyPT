name: iOS TestFlight

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Import Certificate & Provisioning Profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT_PATH=$RUNNER_TEMP/cert.p12
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERT_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERT_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Build & Archive
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $RUNNER_TEMP/signing.keychain-db

          xcodebuild \
            -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath $RUNNER_TEMP/Runner.xcarchive \
            archive \
            OTHER_CODE_SIGN_FLAGS="--keychain $RUNNER_TEMP/signing.keychain-db"

      - name: Export IPA
        run: |
          xcodebuild \
            -exportArchive \
            -archivePath $RUNNER_TEMP/Runner.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist ios/ExportOptions.plist

      - name: Prepare API Key
        env:
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          DECODED_PEM=$(echo -n "$APP_STORE_CONNECT_PRIVATE_KEY" | base64 --decode)
          echo "DECODED_PEM<<PEMEOF" >> $GITHUB_ENV
          echo "$DECODED_PEM" >> $GITHUB_ENV
          echo "PEMEOF" >> $GITHUB_ENV

      - name: Upload to TestFlight
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_IDENTIFIER }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          # Write PKCS#8 key to temp file
          printf '%s' "$DECODED_PEM" > /tmp/AuthKey_pkcs8.p8

          # Convert PKCS#8 → SEC1 EC format (Ruby/OpenSSL 3 requires this format)
          openssl ec -in /tmp/AuthKey_pkcs8.p8 -out /tmp/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8

          # Build API key JSON for Fastlane
          python3 -c "
import json, os
key_id = os.environ['APP_STORE_CONNECT_KEY_ID']
issuer_id = os.environ['APP_STORE_CONNECT_ISSUER_ID']
key = open(f'/tmp/AuthKey_{key_id}.p8').read()
data = {'key_id': key_id, 'issuer_id': issuer_id, 'key': key, 'duration': 1200, 'in_house': False}
json.dump(data, open('/tmp/api_key.json', 'w'))
print('API key JSON created, key starts with:', key[:30])
"
          # Upload via Fastlane pilot
          fastlane pilot upload \
            --ipa "$RUNNER_TEMP/export/fitcoach.ipa" \
            --api_key_path /tmp/api_key.json \
            --skip_waiting_for_build_processing true
